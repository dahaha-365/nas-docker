services:
  sub-store:
    image: xream/sub-store:http-meta
    container_name: sub-store
    cpuset: ${CPUSET:-}
    restart: always
    network_mode: host
    environment:
      SUB_STORE_BACKEND_API_HOST: ${SUB_STORE_BACKEND_API_HOST:-0.0.0.0}
      SUB_STORE_BACKEND_API_PORT: ${SUB_STORE_BACKEND_API_PORT:-3001}
      SUB_STORE_BACKEND_MERGE: ${SUB_STORE_BACKEND_MERGE:-true}
      SUB_STORE_BACKEND_SYNC_CRON: ${SUB_STORE_BACKEND_SYNC_CRON:-}
      SUB_STORE_BACKEND_UPLOAD_CRON: ${SUB_STORE_BACKEND_UPLOAD_CRON:-}
      SUB_STORE_BACKEND_DOWNLOAD_CRON: ${SUB_STORE_BACKEND_DOWNLOAD_CRON:-}
      SUB_STORE_BACKEND_PREFIX: ${SUB_STORE_BACKEND_PREFIX:-}
      SUB_STORE_FRONTEND_BACKEND_PATH: ${SUB_STORE_FRONTEND_BACKEND_PATH:-/sub-store}
      SUB_STORE_MAX_HEADER_SIZE: ${SUB_STORE_MAX_HEADER_SIZE:-}
      SUB_STORE_BODY_JSON_LIMIT: ${SUB_STORE_BODY_JSON_LIMIT:-1mb}
      SUB_STORE_BACKEND_DEFAULT_PROXY: ${SUB_STORE_BACKEND_DEFAULT_PROXY:-}
      SUB_STORE_MMDB_CRON: ${SUB_STORE_MMDB_CRON:-}
      SUB_STORE_MMDB_ASN_PATH: ${SUB_STORE_MMDB_ASN_PATH:-}
      SUB_STORE_MMDB_ASN_URL: ${SUB_STORE_MMDB_ASN_URL:-}
      SUB_STORE_MMDB_COUNTRY_PATH: ${SUB_STORE_MMDB_COUNTRY_PATH:-}
      SUB_STORE_MMDB_COUNTRY_URL: ${SUB_STORE_MMDB_COUNTRY_URL:-}
      SUB_STORE_DATA_URL: ${SUB_STORE_DATA_URL:-}
      SUB_STORE_DATA_URL_POST: ${SUB_STORE_DATA_URL_POST:-}
      SUB_STORE_PRODUCE_CRON: ${SUB_STORE_PRODUCE_CRON:-}
      # HTTP-META 的, 一般不用改
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-9876}
    volumes:
      - ./data:/opt/app/data
